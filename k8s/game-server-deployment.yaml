apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-server
  namespace: chaos-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: game-server
  template:
    metadata:
      labels:
        app: game-server
    spec:
      serviceAccountName: chaos-game-admin
      containers:
        - name: game-server
          image: chaos-fire-drill-game-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MOCK_MODE
              value: "false"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-credentials
                  key: LLM_API_KEY
            - name: LLM_API_URL
              valueFrom:
                secretKeyRef:
                  name: llm-api-credentials
                  key: LLM_API_URL
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: llm-api-credentials
                  key: LLM_MODEL
---
apiVersion: v1
kind: Service
metadata:
  name: game-server
  namespace: chaos-game
spec:
  selector:
    app: game-server
  ports:
    - port: 3001
      targetPort: 3001
  type: LoadBalancer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-game-admin
  namespace: chaos-game
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-game-operator
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "events"]
    verbs: ["get", "list", "watch", "delete", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-game-operator-binding
subjects:
  - kind: ServiceAccount
    name: chaos-game-admin
    namespace: chaos-game
roleRef:
  kind: ClusterRole
  name: chaos-game-operator
  apiGroup: rbac.authorization.k8s.io
